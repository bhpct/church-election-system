<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選舉結果發布</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            padding: 2rem;
        }
        .header-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .stats-bar {
            background-color: #fff;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 1.2rem;
            color: #6c757d;
            font-weight: 500;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #212529;
        }
        
        .district-col {
            background-color: #fff;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 100%;
        }
        .district-title {
            font-size: 2rem;
            font-weight: 700;
            color: #198754;
            border-bottom: 3px solid #198754;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .masonry-layout {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .masonry-layout { column-count: 2; } }
        @media (min-width: 1200px) { .masonry-layout { column-count: 3; } }
        .masonry-item {
            break-inside: avoid;
            page-break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        
        .candidate-card {
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            transition: transform 0.2s;
        }
        .candidate-card.is-elected {
            border-color: #dc3545;
            background-color: #fff5f5;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.2);
            transform: scale(1.02);
        }
        .candidate-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .cand-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #6c757d;
            background-color: #e9ecef;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .cand-name {
            font-size: 2.2rem;
            font-weight: 700;
        }
        .cand-votes {
            font-size: 2.5rem;
            font-weight: 900;
            color: #0d6efd;
        }
        .elected-badge {
            font-size: 1.5rem;
            color: #dc3545;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        #loadingSpinner {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loadingSpinner">
        <div class="spinner-border text-primary" style="width: 5rem; height: 5rem;" role="status"></div>
        <h2 class="mt-4 text-muted">正在載入選舉結果...</h2>
    </div>

    <div class="container-fluid" id="mainContent" style="display: none;">
        
        <h1 class="header-title" id="displayTitle">--- 選舉結果 ---</h1>
        
        <div class="stats-bar mt-4">
            <div class="stat-item">
                <div class="stat-label">應選名額</div>
                <div class="stat-value" id="displaySeats">0</div>
            </div>
            <div class="stat-item text-primary">
                <div class="stat-label">總發票數</div>
                <div class="stat-value" id="displayTotalIssued">0</div>
            </div>
            <div class="stat-item text-warning">
                <div class="stat-label">總收票數(含空白票)</div>
                <div class="stat-value text-dark" id="displayTotalReceived">0</div>
            </div>
            <div class="stat-item text-secondary">
                <div class="stat-label">總空白票數</div>
                <div class="stat-value" id="displayTotalBlank">0</div>
            </div>
        </div>

        <div id="resultsGrid" class="row g-4 mt-2">
            <!-- 動態產生結果 -->
        </div>

    </div>

    <!-- Firebase SDKs (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- 主程式邏輯 -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABw9ATwX7E0YxtkM4PK_YCpAEH98X0nBs",
            authDomain: "church-election-system-7c674.firebaseapp.com",
            projectId: "church-election-system-7c674",
            storageBucket: "church-election-system-7c674.firebasestorage.app",
            messagingSenderId: "107251562289",
            appId: "1:107251562289:web:a9cd450302d7c235aa6210"
        };
        firebase.initializeApp(firebaseConfig);
        loadResults();

        async function loadResults() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const electionId = urlParams.get('election_id');
                const itemId = urlParams.get('item_id');
                const roundId = urlParams.get('round_id');

                if (!electionId || !itemId || !roundId) {
                    throw new Error("缺少必要的 URL 參數");
                }

                const db = firebase.firestore();
                
                // 讀取項次資料 (單次讀取)
                const itemDoc = await db.collection('elections').doc(electionId).collection('items').doc(itemId).get();
                if (!itemDoc.exists) throw new Error("找不到項次資料");
                const itemData = itemDoc.data();

                // 監聽輪次資料 (即時更新)
                db.collection('elections').doc(electionId).collection('items').doc(itemId).collection('rounds').doc(roundId)
                  .onSnapshot(async (roundDoc) => {
                      if (!roundDoc.exists) {
                          document.getElementById('loadingSpinner').innerHTML = '<h2 class="text-danger">找不到輪次資料</h2>';
                          return;
                      }
                      const roundData = roundDoc.data();
                      const status = roundData.status || 'PENDING';

                      if (status !== 'PUBLISHED') {
                          // 顯示等待畫面
                          let msg = '選舉進行中...';
                          let icon = 'fa-spinner fa-spin text-primary';
                          if (status === 'CLOSED') {
                              msg = '投票已結束，開票結算中...';
                              icon = 'fa-calculator text-warning';
                          } else if (status === 'ACTIVE') {
                              msg = '投票進行中...請大家踴躍投票';
                              icon = 'fa-person-booth text-success';
                          }
                          
                          document.getElementById('loadingSpinner').innerHTML = `
                              <i class="fas ${icon}" style="font-size: 5rem; margin-bottom: 2rem;"></i>
                              <h1 class="fw-bold" style="font-size: 3rem;">${itemData.title}</h1>
                              <h2 class="mt-2 text-muted fs-1">${msg}</h2>
                          `;
                          document.getElementById('loadingSpinner').style.display = 'flex';
                          document.getElementById('mainContent').style.display = 'none';
                          return;
                      }

                      // 狀態為 PUBLISHED，開始渲染結果
                      document.getElementById('loadingSpinner').innerHTML = `
                          <div class="spinner-border text-primary" style="width: 5rem; height: 5rem;" role="status"></div>
                          <h2 class="mt-4 text-muted">正在載入選舉結果...</h2>
                      `;

                      // 設定標題與統計數字
                      const roundNames = { 'round_1': '第一輪', 'round_2': '第二輪', 'round_3': '第三輪' };
                      const rName = roundNames[roundId] || roundId;
                      document.getElementById('displayTitle').textContent = `${itemData.title} - ${rName} 開票結果`;
                      
                      const effectiveSeats = roundData.seats !== undefined ? roundData.seats : itemData.seats;
                      document.getElementById('displaySeats').textContent = effectiveSeats;

                      const digitalIssued = roundData.digital_issued || 0;
                      const paperIssued = roundData.paper_issued || 0;
                      document.getElementById('displayTotalIssued').textContent = digitalIssued + paperIssued;

                      // 總收票數需計算 digitalUsed
                      const keysSnap = await db.collection('elections').doc(electionId).collection('keys')
                          .where('item_id', '==', itemId).where('round_id', '==', roundId).where('status', '==', 'USED').get();
                      const digitalUsed = keysSnap.size;
                      const paperReceived = roundData.paper_received || 0;
                      document.getElementById('displayTotalReceived').textContent = digitalUsed + paperReceived;

                      const paperBlank = roundData.paper_blank || 0;
                      // 計算數位空白票
                      const votesSnap = await db.collection('elections').doc(electionId).collection('votes')
                          .where('item_id', '==', itemId).where('round_id', '==', roundId).get();
                      let digitalBlank = 0;
                      let digitalVotesMap = {};
                      votesSnap.forEach(doc => {
                          const d = doc.data();
                          if (d.candidate_ids && Array.isArray(d.candidate_ids)) {
                              if (d.candidate_ids.length === 0) {
                                  digitalBlank++;
                              } else {
                                  d.candidate_ids.forEach(cid => {
                                      digitalVotesMap[cid] = (digitalVotesMap[cid] || 0) + 1;
                                  });
                              }
                          }
                      });
                      document.getElementById('displayTotalBlank').textContent = digitalBlank + paperBlank;

                      // 取得候選人並計算總票數
                      const candidateIds = roundData.candidate_ids || [];
                      if (candidateIds.length === 0) {
                          document.getElementById('resultsGrid').innerHTML = '<div class="col-12 text-center text-muted fs-3">此輪次無候選人</div>';
                          document.getElementById('loadingSpinner').style.display = 'none';
                          document.getElementById('mainContent').style.display = 'block';
                          return;
                      }

                      // 分批讀取候選人資料
                      const candidates = [];
                      for (let i = 0; i < candidateIds.length; i += 10) {
                          const batchIds = candidateIds.slice(i, i + 10);
                          const cSnap = await db.collection('elections').doc(electionId).collection('candidates')
                              .where(firebase.firestore.FieldPath.documentId(), 'in', batchIds).get();
                          cSnap.forEach(d => {
                              candidates.push({ id: d.id, ...d.data() });
                          });
                      }

                      const electedIds = roundData.elected_ids || [];
                      const forcedId = roundData.forced_candidate_id !== undefined ? roundData.forced_candidate_id : itemData.forced_candidate_id;
                      
                      let processedCandidates = candidates.map(c => {
                          const dVotes = digitalVotesMap[c.id] || 0;
                          const pVotes = (roundData.paper_votes && roundData.paper_votes[c.id]) ? parseInt(roundData.paper_votes[c.id]) : 0;
                          return {
                              ...c,
                              total_votes: dVotes + pVotes,
                              is_elected: electedIds.includes(c.id),
                              is_forced: c.id === forcedId
                          };
                      });

                      // 僅保留有得票的人 (得票數 > 0) 或者已當選的人
                      processedCandidates = processedCandidates.filter(c => c.total_votes > 0 || c.is_elected);

                      // 依據當選與得票數排序
                      processedCandidates.sort((a, b) => {
                          if (a.is_elected && !b.is_elected) return -1;
                          if (!a.is_elected && b.is_elected) return 1;
                          return b.total_votes - a.total_votes;
                      });

                      // 分組邏輯
                      const reqDistrict = roundData.require_district !== undefined ? roundData.require_district : itemData.require_district;
                      
                      const grid = document.getElementById('resultsGrid');
                      grid.innerHTML = '';

                      if (reqDistrict || forcedId) {
                          const groups = {};
                          
                          if (forcedId) {
                              groups['保障名額'] = processedCandidates.filter(c => c.is_forced);
                          }
                          
                          const others = processedCandidates.filter(c => !c.is_forced);
                          if (reqDistrict) {
                              others.forEach(c => {
                                  const dist = c.district || '未分區';
                                  if (!groups[dist]) groups[dist] = [];
                                  groups[dist].push(c);
                              });
                          } else {
                              groups['候選人名單'] = others;
                          }

                          const colClass = Object.keys(groups).length > 2 ? 'col-md-4' : 'col-md-6';
                          
                          for (const [groupName, groupCands] of Object.entries(groups)) {
                              if (groupCands.length === 0 && groupName !== '保障名額') continue;
                              
                              let html = `
                                  <div class="${colClass} mb-4">
                                      <div class="district-col">
                                          <div class="district-title">${groupName}</div>
                              `;
                              
                              if (groupCands.length === 0) {
                                  html += `<div class="text-center text-muted fs-5 mt-4">無人得票</div>`;
                              } else {
                                  html += `<div class="masonry-layout">`;
                                  groupCands.forEach(c => {
                                      html += `<div class="masonry-item">${generateCandidateCard(c)}</div>`;
                                  });
                                  html += `</div>`;
                              }
                              
                              html += `</div></div>`;
                              grid.innerHTML += html;
                          }

                      } else {
                          const html = `
                              <div class="col-12">
                                  <div class="district-col">
                                      <div class="masonry-layout" id="masonryContainer">
                                      </div>
                                  </div>
                              </div>
                          `;
                          grid.innerHTML = html;
                          
                          const rowContainer = grid.querySelector('#masonryContainer');
                          processedCandidates.forEach(c => {
                              const div = document.createElement('div');
                              div.className = 'masonry-item';
                              div.innerHTML = generateCandidateCard(c);
                              rowContainer.appendChild(div);
                          });
                      }

                      document.getElementById('loadingSpinner').style.display = 'none';
                      document.getElementById('mainContent').style.display = 'block';
                  });

            } catch (error) {
                console.error("載入失敗:", error);
                document.getElementById('loadingSpinner').innerHTML = `
                    <div class="text-danger">
                        <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                        <h2>錯誤發生</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function generateCandidateCard(c) {
            const electedClass = c.is_elected ? 'is-elected' : '';
            const electedBadge = c.is_elected ? '<div class="elected-badge"><i class="fas fa-stamp"></i> 當選</div>' : '';
            
            return `
                <div class="candidate-card ${electedClass}">
                    <div class="candidate-info">
                        <div class="cand-number">${c.number || ''}</div>
                        <div class="cand-name">${c.name}</div>
                    </div>
                    <div class="d-flex align-items-center gap-4">
                        ${electedBadge}
                        <div class="cand-votes">${c.total_votes} <span class="fs-4 text-muted fw-normal">票</span></div>
                    </div>
                </div>
            `;
        }

    </script>
</body>
</html>

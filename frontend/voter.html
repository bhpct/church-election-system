<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數位投票系統</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .container {
            max-width: 600px;
            padding: 15px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .header-banner {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            padding: 20px 15px;
            text-align: center;
        }
        .header-banner h4 {
            margin: 0;
            font-weight: bold;
        }
        /* Auth View */
        #view-auth .key-input {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
        }
        /* Ballot View */
        .candidate-search-box {
            position: relative;
        }
        .candidate-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ced4da;
            border-radius: 0 0 10px 10px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .candidate-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .candidate-item:hover {
            background-color: #f8f9fa;
        }
        .candidate-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e9ecef;
        }
        .selected-candidate {
            background: #e7f1ff;
            border: 1px solid #0d6efd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* View transitions */
        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .view-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container mt-3">
    
    <!-- 載入中畫面 -->
    <div id="loader" class="text-center py-5">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
        <p class="mt-3 text-muted fw-bold">系統連線中...</p>
    </div>

    <!-- 視圖 1: 登入 (驗證金鑰) -->
    <div id="view-auth" class="view-section">
        <div class="card">
            <div class="header-banner">
                <h4><i class="fas fa-vote-yea"></i> 教會數位選舉系統</h4>
                <p class="mb-0 mt-1 opacity-75">安全、匿名、即時</p>
            </div>
            <div class="card-body p-4 text-center">
                <h5 class="mb-3 text-primary"><i class="fas fa-key"></i> 請輸入您的選票金鑰</h5>
                <p class="text-muted small mb-4">金鑰為8碼數字，請參考您拿到的實體選票。</p>
                
                <input type="tel" id="keyInput" class="form-control key-input mb-4" placeholder="12345678" maxlength="8">
                
                <button class="btn btn-primary btn-lg w-100 fw-bold rounded-pill" id="btnVerifyKey">
                    進入投票 <i class="fas fa-arrow-right ms-1"></i>
                </button>

                <hr class="my-4">
                <button class="btn btn-outline-secondary btn-sm" id="btnGoToAudit">
                    <i class="fas fa-search"></i> 驗票查核 (事後驗證)
                </button>
            </div>
        </div>
    </div>

    <!-- 視圖 2: 選票畫面 -->
    <div id="view-ballot" class="view-section">
        <div class="card border-primary">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="m-0" id="ballotElectionName">選舉名稱</h4>
                <h5 class="m-0 mt-2 text-warning fw-bold" id="ballotItemRoundName">項次 - 輪次</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info py-2 mb-4 text-center">
                    <i class="fas fa-info-circle"></i> 本輪次應選名額：<strong class="fs-5 text-danger" id="ballotQuota">0</strong> 名
                    <div id="ballotDistrictRule" class="small mt-1 text-danger fw-bold" style="display:none;">(含強制分區限制)</div>
                </div>

                <div id="ballotSelectionsContainer">
                    <!-- 動態產生的搜尋與選擇框 -->
                </div>

            </div>
            <div class="card-footer bg-white p-3">
                <button class="btn btn-success btn-lg w-100 fw-bold rounded-pill shadow-sm" id="btnSubmitVote">
                    <i class="fas fa-paper-plane"></i> 確認送出選票
                </button>
            </div>
        </div>
    </div>

    <!-- 視圖 3: 等候大廳與開票結果 -->
    <div id="view-waiting" class="view-section">
        <div class="card text-center">
            <div class="card-body py-5">
                <div id="waitStatusIcon" class="mb-3">
                    <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                </div>
                <h3 class="fw-bold text-success mb-2" id="waitTitle">投票成功！</h3>
                <p class="text-muted" id="waitSubtitle">您的選票已安全送出，請靜候開票。</p>
                <hr>
                
                <div id="liveResultSection" style="display: none;">
                    <h5 class="fw-bold text-primary mb-3"><i class="fas fa-bullhorn"></i> 本輪開票結果</h5>
                    <div class="list-group text-start" id="liveResultList">
                        <!-- 開票結果動態顯示 -->
                    </div>
                </div>
                
                <div id="waitSpinner" class="mt-4">
                    <div class="spinner-grow text-primary" role="status"></div>
                    <div class="spinner-grow text-success" role="status"></div>
                    <div class="spinner-grow text-info" role="status"></div>
                    <p class="text-muted mt-2 small">等待大會發布結果中...</p>
                </div>
            </div>
            <div class="card-footer bg-white">
                <button class="btn btn-outline-primary w-100" onclick="location.reload()">重新整理 / 回首頁</button>
            </div>
        </div>
    </div>

    <!-- 視圖 4: 驗票查核 -->
    <div id="view-audit" class="view-section">
        <div class="card">
            <div class="card-header bg-secondary text-white fw-bold">
                <i class="fas fa-search"></i> 驗票查核中心
            </div>
            <div class="card-body">
                <p class="text-muted small">為確保選票不被竄改，您可以輸入您投過的金鑰，系統將調出該金鑰所圈選的名單，供您核對。</p>
                <div class="input-group mb-3">
                    <input type="tel" id="auditKeyInput" class="form-control form-control-lg text-center fw-bold letter-spacing-2" placeholder="輸入8碼金鑰" maxlength="8">
                    <button class="btn btn-primary" id="btnAuditSearch">查詢</button>
                </div>
                
                <div id="auditResult" class="mt-4" style="display:none;">
                    <div class="alert alert-success">
                        <h6 class="alert-heading fw-bold">查詢成功</h6>
                        <ul class="mb-0" id="auditVoteList">
                            <!-- JS 生成 -->
                        </ul>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-white text-center">
                <button class="btn btn-link text-secondary" id="btnBackToAuth">返回首頁</button>
            </div>
        </div>
    </div>

</div>

<!-- Firebase SDK -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- 本機 JS -->
<script src="voter.js"></script>

</body>
</html>
